<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>J4CMIS — Login</title>
<style>
  body{font-family:-apple-system,Arial,sans-serif;background:#1f2d3d;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
  .box{background:#fff;padding:32px;border-radius:8px;width:320px;}
  h1{font-size:18px;margin:0 0 20px;}
  input{width:100%;padding:8px;margin-bottom:12px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
  button{width:100%;padding:10px;background:#1f2d3d;color:#fff;border:none;border-radius:4px;cursor:pointer;}
  .errorlist{color:#b85450;font-size:13px;list-style:none;padding:0;}
</style>
</head>
<body>
  <div class="box">
    <h1>J4CMIS Login</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
